# Standard Dependabot-konfig for TypeScript/JavaScript-repoene (kopier til repoets .github/dependabot.yml).
# Daglig sjekk + 7 dagers cooldown er et bevisst supply-chain-mottiltak (jf. tj-actions-hendelsen) - ikke treghet.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
