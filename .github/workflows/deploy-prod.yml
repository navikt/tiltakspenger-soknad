name: Build and deploy

# Raske påfølgende pushes ga overlappende NAIS-rollouts i backend-repoene (2026-07-16).
# Kjør deployene serielt; ved flere ventende kjøringer vinner den nyeste.
concurrency:
  group: build-and-deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.env-template'
      - '.gitattributes'
      # CI-endringer deployer ikke - de verifiseres av branch-gaten og metarepoets lint (beslutning i navikt/tiltakspenger#39).
      - '.github/**'
      - '.gitignore'
      - '.husky/**'
      - 'CODEOWNERS'
      - 'docker-compose/**'
      - 'LICENSE'

# Minste privilegium: toppnivået nullstiller alle token-rettigheter, hver jobb deklarerer eksplisitt det den trenger.
permissions: {}

# Image-bygget er lokalt (.build-app.yml: ENV-matrise, env-filer, CDN-opplasting); deployen er delt - se
# https://github.com/navikt/tiltakspenger/blob/main/.github/workflows/README.md
jobs:
  build-prod:
    name: Build and push
    uses: ./.github/workflows/.build-app.yml
    permissions:
      contents: read
      id-token: write
    with:
      ENV: prod
    secrets:
      NAIS_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
      SLACK_VARSEL_WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}

  deploy-prod:
    name: Deploy to NAIS (prod)
    needs: [ build-prod ]
    uses: navikt/tiltakspenger/.github/workflows/deploy-nais.yml@main
    permissions:
      contents: read
      id-token: write
    with:
      NAIS_ENV: prod
      IMAGE: ${{ needs.build-prod.outputs.IMAGE }}

  build-and-deploy-dev:
    name: Build and deploy to dev
    uses: ./.github/workflows/.deploy-dev-apps.yml
    permissions:
      contents: read
      id-token: write
    secrets:
      NAIS_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
      SLACK_VARSEL_WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}
