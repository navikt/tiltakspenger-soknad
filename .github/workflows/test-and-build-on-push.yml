name: Test/build on feature branch push

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - '**.md'
      - '.env-template'
      - '.gitattributes'
      - '.gitignore'
      - '.husky/**'
      - 'CODEOWNERS'
      - 'docker-compose/**'
      - 'LICENSE'

# Minste privilegium: toppnivået nullstiller alle token-rettigheter, hver jobb deklarerer eksplisitt det den trenger.
permissions: {}

jobs:
  build:
    name: Build app
    # Delt workflow i metarepoet, se https://github.com/navikt/tiltakspenger/blob/main/.github/workflows/README.md
    uses: navikt/tiltakspenger/.github/workflows/test-og-bygg-node.yml@main
    permissions:
      contents: read
    with:
      node-version: '24'
      # Samme gate som det lokale image-bygget kjører (jf. .build-app.yml): env-fil, typer, lint og next-bygg.
      kommando: cp .env.dev .env.production && npx tsc --noEmit && "$PAKKEHANDTERER" run lint && "$PAKKEHANDTERER" run build
    secrets:
      READER_TOKEN: ${{ secrets.READER_TOKEN }}
      SLACK_VARSEL_WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}
