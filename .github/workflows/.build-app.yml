name: Build app

# Lokal reusable workflow: bygger appen for et gitt miljø og pusher image (+ CDN-opplasting for prod).
# Bevisst ikke delt (jf. metarepoets workflows-README): ENV-matrise, env-filer, image_suffix og CDN er repo-spesifikke.

on:
  workflow_call:
    inputs:
      ENV:
        required: true
        type: string
      buildImage:
        required: false
        type: boolean
        default: true
    outputs:
      IMAGE:
        description: "Docker image"
        value: ${{ jobs.build.outputs.IMAGE }}
    secrets:
      NAIS_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      READER_TOKEN:
        required: true
      SLACK_VARSEL_WEBHOOK_URL:
        required: true

# Minste privilegium: toppnivået nullstiller token-rettighetene for jobber som ikke deklarerer egne.
permissions: {}

jobs:
  build:
    name: Build app for ${{ inputs.ENV }}
    runs-on: ubuntu-latest
    # id-token: write er kun for OIDC-føderasjonen i docker-build-push/cdn-upload; GITHUB_TOKEN har bare lesetilgang.
    permissions:
      contents: read
      id-token: write
    outputs:
      IMAGE: ${{ steps.docker-push.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Ikke la tokenet ligge igjen i .git/config - byggesteget kjører avhengigheters kode.
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          registry-url: "https://npm.pkg.github.com"

      # READER_TOKEN trengs for @navikt-pakker fra GitHub Packages; den har kun read:packages.
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Copy env file
        run: cp ".env.$MILJO" .env.production
        env:
          MILJO: ${{ inputs.ENV }}

      - name: Run type checking
        run: npx tsc --noEmit

      - name: Run linting
        run: npm run lint

      - name: Build app
        run: npm run build

      - name: Build and push docker image
        # Versjonsoversikt (tag -> SHA): https://github.com/nais/docker-build-push/tags
        uses: nais/docker-build-push@31c3a7321909bcb20799fdf46153fec721fd9512 # v0
        if: inputs.buildImage == true
        id: docker-push
        with:
          team: tpts
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          image_suffix: ${{ inputs.ENV }}

      # Actionen bor i nais/deploy-repoet og versjoneres i stien (/v2); resten av Nav bruker @master, vi SHA-pinner (jf. metarepoets workflows-README).
      - name: Upload static files to NAV CDN
        uses: nais/deploy/actions/cdn-upload/v2@2d18f050f07b6a007864c6a57070ed915d571beb # master 2026-07
        if: inputs.ENV == 'prod'
        with:
          team: tpts
          source: ./.next/static
          destination: "/tiltakspenger-soknad/_next"
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}

      # All kontekst går via env (aldri ${{ }} direkte i run), og payloaden bygges med jq så verdier med spesialtegn ikke kan knekke/injisere JSON-en.
      # curl -sSf gjør at et avvist webhook-kall feiler steget synlig i stedet for å forsvinne stille.
      - name: Notify Slack in case of build failure
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          payload=$(jq -n --arg pretext "[$REPO_NAME] Build failed :cry:" --arg author "$AUTHOR" --arg commit "<https://github.com/$REPO/commit/$COMMIT_SHA|$COMMIT_SHA>" '{attachments: [{pretext: $pretext, color: "danger", fields: [{title: "Author", value: $author, short: false}, {title: "Commit", value: $commit, short: false}]}]}')
          curl -sSf -X POST --data-urlencode "payload=$payload" "$WEBHOOK_URL"
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_VARSEL_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          REPO_NAME: ${{ github.event.repository.name }}
          AUTHOR: ${{ github.event.pusher.name }}
          COMMIT_SHA: ${{ github.sha }}
