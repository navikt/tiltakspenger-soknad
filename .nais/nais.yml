apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: tiltakspenger-soknad
  namespace: tpts
  labels:
    team: tpts
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  image: {{ image }}
  port: 3000
  # Avvik fra felles probe-mal (se «Delte konvensjoner» i navikt/tiltakspenger AGENTS.md):
  # appen har ingen helse-endepunkter (all /api-trafikk går via catch-all-middleware mot soknad-api),
  # så prober er ikke konfigurert. Skru på malen når egne isAlive-/isReady-endepunkter er på plass.
  env:
      - name: TILTAKSPENGER_SOKNAD_API_URL
        value: {{ TILTAKSPENGER_SOKNAD_API_URL }}
      - name: NEXT_PUBLIC_TELEMETRY_URL
        value: {{ NEXT_PUBLIC_TELEMETRY_URL }}
      - name: DEKORATOR_ENV
        value: {{ dekorator.env }}
  ingresses:
    - {{ ingress }}
  replicas:
    min: 2
    max: 2
  tokenx:
    enabled: true
  accessPolicy:
    outbound:
      rules:
        - application: tiltakspenger-soknad-api
        - application: nav-dekoratoren
          namespace: personbruker
  idporten:
    enabled: true
    sidecar:
      enabled: true
      level: Level4
      autoLogin: true
  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
    logging:
      destinations:
        - id: elastic
        - id: loki
